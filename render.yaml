services:
  - type: web
    name: discord-selfbot
    runtime: node
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DISCORD_TOKEN
        sync: false
        required: true
    healthCheckPath: /health
    autoDeploy: true
