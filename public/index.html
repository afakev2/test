<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-88">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord SelfBot - لوحة تحكم متكاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rubik', sans-serif;
        }

        :root {
            --bg-primary: #1a1b2f;
            --bg-secondary: #23243a;
            --bg-tertiary: #2c2e45;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --text-primary: #ffffff;
            --text-secondary: #b5b9d4;
            --text-muted: #7d7f9a;
            --green: #23a55a;
            --red: #f23f42;
            --yellow: #f0b232;
            --border: #2c2e45;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* تخطيط مثل ديسكورد */
        .app {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* شريط الخوادم الجانبي */
        .guilds-bar {
            width: 72px;
            background: var(--bg-tertiary);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .guilds-bar::-webkit-scrollbar {
            display: none;
        }

        .guild-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg-secondary);
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            color: var(--text-primary);
            border: 2px solid transparent;
        }

        .guild-icon:hover {
            border-radius: 16px;
            background: var(--accent);
        }

        .guild-icon.active {
            border-radius: 16px;
            border-color: var(--accent);
        }

        .guild-icon.active::before {
            content: '';
            position: absolute;
            right: -8px;
            width: 4px;
            height: 20px;
            background: white;
            border-radius: 4px;
        }

        .guild-icon img {
            width: 100%;
            height: 100%;
            border-radius: inherit;
            object-fit: cover;
        }

        .guild-separator {
            width: 32px;
            height: 2px;
            background: var(--text-muted);
            margin: 8px 0;
        }

        /* شريط القنوات */
        .channels-bar {
            width: 240px;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
        }

        .channels-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }

        .channels-header:hover {
            background: var(--bg-tertiary);
        }

        .channels-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 8px;
        }

        .channel-category {
            margin-bottom: 16px;
        }

        .category-header {
            padding: 8px 8px;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }

        .category-header:hover {
            color: var(--text-primary);
        }

        .channel-item {
            padding: 6px 8px;
            margin: 2px 0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .channel-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .channel-item.active {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .channel-item i {
            font-size: 20px;
            color: var(--text-muted);
        }

        .channel-item.voice i {
            color: var(--green);
        }

        /* منطقة الدردشة الرئيسية */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 16px;
            animation: fadeIn 0.3s;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message-author {
            font-weight: 600;
            color: var(--text-primary);
        }

        .message-timestamp {
            font-size: 12px;
            color: var(--text-muted);
        }

        .message-text {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.4;
        }

        .message-actions {
            opacity: 0;
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }

        .message:hover .message-actions {
            opacity: 1;
        }

        .message-action {
            padding: 4px 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .message-action:hover {
            background: var(--accent);
            color: white;
        }

        /* منطقة كتابة الرسائل */
        .chat-input-area {
            padding: 20px;
            border-top: 1px solid var(--border);
        }

        .chat-input-wrapper {
            background: var(--bg-tertiary);
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .chat-input-actions {
            display: flex;
            gap: 12px;
            color: var(--text-muted);
        }

        .chat-input-actions i {
            cursor: pointer;
            font-size: 18px;
        }

        .chat-input-actions i:hover {
            color: var(--accent);
        }

        /* الشريط الجانبي الأيمن */
        .right-sidebar {
            width: 300px;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        .user-panel {
            padding: 16px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            position: relative;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-status {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--bg-tertiary);
        }

        .user-status.online { background: var(--green); }
        .user-status.idle { background: var(--yellow); }
        .user-status.dnd { background: var(--red); }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 14px;
        }

        .user-tag {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* أقسام التحكم */
        .control-section {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .section-title {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .voice-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .voice-control-item {
            background: var(--bg-tertiary);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .voice-control-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .voice-control-info i {
            color: var(--green);
        }

        /* مفاتيح التشغيل */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--text-muted);
            transition: .3s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--green);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        /* قائمة الخوادم في الرسائل */
        .server-selector {
            margin-bottom: 16px;
        }

        .server-select {
            width: 100%;
            padding: 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
        }

        /* أزرار التحكم */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-danger {
            background: var(--red);
            color: white;
        }

        .btn-danger:hover {
            opacity: 0.8;
        }

        .btn-success {
            background: var(--green);
            color: white;
        }

        /* قائمة السياق */
        .context-menu {
            position: fixed;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 4px 0;
            min-width: 160px;
            z-index: 1000;
        }

        .context-menu-item {
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .context-menu-item:hover {
            background: var(--accent);
            color: white;
        }

        .context-menu-item.danger:hover {
            background: var(--red);
        }

        /* مؤشر الصوت */
        .voice-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
        }

        .voice-user {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--bg-tertiary);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .voice-user i {
            color: var(--green);
        }

        .voice-user.muted i {
            color: var(--red);
        }

        .voice-user.deaf i {
            color: var(--yellow);
        }

        /* التحميل */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-muted);
        }

        .loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* إشعارات */
        .notification {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--bg-tertiary);
            border-right: 4px solid var(--accent);
            padding: 12px 20px;
            border-radius: 4px;
            z-index: 10000;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- شريط الخوادم -->
        <div class="guilds-bar" id="guildsBar">
            <div class="guild-icon active">
                <i class="fas fa-compass"></i>
            </div>
            <div class="guild-separator"></div>
            <div class="loading">
                <i class="fas fa-spinner"></i>
            </div>
        </div>

        <!-- شريط القنوات -->
        <div class="channels-bar" id="channelsBar">
            <div class="channels-header">
                <span id="selectedGuildName">اختر سيرفر</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="channels-list" id="channelsList">
                <div class="loading">
                    <i class="fas fa-spinner"></i> جاري التحميل...
                </div>
            </div>
        </div>

        <!-- منطقة الدردشة -->
        <div class="chat-area">
            <div class="chat-header" id="chatHeader">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-hashtag" style="color: var(--text-muted);"></i>
                    <span id="currentChannelName">الرسائل</span>
                </div>
                <div style="display: flex; gap: 16px; color: var(--text-muted);">
                    <i class="fas fa-phone-alt" style="cursor: pointer;" title="بدء مكالمة"></i>
                    <i class="fas fa-video" style="cursor: pointer;" title="بدء فيديو"></i>
                    <i class="fas fa-user-plus" style="cursor: pointer;" title="دعوة"></i>
                    <i class="fas fa-search" style="cursor: pointer;" title="بحث"></i>
                    <i class="fas fa-inbox" style="cursor: pointer;" title="الوارد"></i>
                    <i class="fas fa-question-circle" style="cursor: pointer;" title="مساعدة"></i>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <!-- الرسائل ستظهر هنا -->
                <div class="loading">
                    <i class="fas fa-spinner"></i> جاري تحميل الرسائل...
                </div>
            </div>

            <div class="chat-input-area">
                <div class="chat-input-wrapper">
                    <input type="text" class="chat-input" id="messageInput" placeholder="اكتب رسالة...">
                    <div class="chat-input-actions">
                        <i class="fas fa-paperclip" title="إرفاق ملف"></i>
                        <i class="fas fa-smile" title="إضافة إيموجي"></i>
                        <i class="fas fa-gift" title="هدية"></i>
                        <i class="fas fa-paper-plane" id="sendMessageBtn" title="إرسال"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- الشريط الجانبي الأيمن -->
        <div class="right-sidebar">
            <!-- لوحة المستخدم -->
            <div class="user-panel" id="userPanel">
                <div class="user-avatar" id="userAvatar">
                    <img src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Avatar">
                    <div class="user-status online" id="userStatus"></div>
                </div>
                <div class="user-info">
                    <div class="user-name" id="userName">جاري التحميل...</div>
                    <div class="user-tag" id="userTag">#0000</div>
                </div>
                <div style="display: flex; gap: 8px;">
                    <i class="fas fa-microphone" style="cursor: pointer;" title="كتم الميكروفون" id="micToggle"></i>
                    <i class="fas fa-headphones" style="cursor: pointer;" title="كتم السماعة" id="deafToggle"></i>
                    <i class="fas fa-cog" style="cursor: pointer;" title="الإعدادات"></i>
                </div>
            </div>

            <!-- التحكم الصوتي -->
            <div class="control-section">
                <div class="section-title">
                    <span>التحكم الصوتي</span>
                    <i class="fas fa-sliders-h"></i>
                </div>
                
                <div class="voice-controls">
                    <div class="voice-control-item">
                        <div class="voice-control-info">
                            <i class="fas fa-microphone"></i>
                            <span>كتم الميكروفون</span>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="micMuteToggle">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div class="voice-control-item">
                        <div class="voice-control-info">
                            <i class="fas fa-volume-mute"></i>
                            <span>كتم السماعة</span>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="deafMuteToggle">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div class="voice-control-item">
                        <div class="voice-control-info">
                            <i class="fas fa-clock"></i>
                            <span>وضع AFK</span>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="afkToggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <!-- اختيار القناة الصوتية -->
                <div style="margin-top: 16px;">
                    <select class="server-select" id="voiceGuildSelect">
                        <option value="">اختر سيرفر للصوت</option>
                    </select>
                    <select class="server-select" style="margin-top: 8px;" id="voiceChannelSelect">
                        <option value="">اختر قناة صوتية</option>
                    </select>
                    
                    <div style="display: flex; gap: 8px; margin-top: 12px;">
                        <button class="btn btn-success" style="flex: 1;" id="joinVoiceBtn">
                            <i class="fas fa-sign-in-alt"></i> دخول
                        </button>
                        <button class="btn btn-danger" style="flex: 1;" id="leaveVoiceBtn">
                            <i class="fas fa-sign-out-alt"></i> خروج
                        </button>
                    </div>
                </div>

                <!-- المتصلون في الصوت -->
                <div class="voice-indicator" id="voiceUsers">
                    <!-- المستخدمين في الصوت سيظهرون هنا -->
                </div>
            </div>

            <!-- التحكم في الرسائل -->
            <div class="control-section">
                <div class="section-title">
                    <span>التحكم في الرسائل</span>
                    <i class="fas fa-edit"></i>
                </div>

                <div style="margin-bottom: 12px;">
                    <select class="server-select" id="messageGuildSelect">
                        <option value="">اختر سيرفر للرسائل</option>
                    </select>
                    <select class="server-select" style="margin-top: 8px;" id="messageChannelSelect">
                        <option value="">اختر قناة نصية</option>
                    </select>
                </div>

                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-primary" style="flex: 1;" id="loadMessagesBtn">
                        <i class="fas fa-sync"></i> تحميل الرسائل
                    </button>
                    <button class="btn btn-danger" style="flex: 1;" id="clearMessagesBtn">
                        <i class="fas fa-trash"></i> مسح
                    </button>
                </div>
            </div>

            <!-- إحصائيات سريعة -->
            <div class="control-section">
                <div class="section-title">
                    <span>إحصائيات</span>
                    <i class="fas fa-chart-line"></i>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <div style="background: var(--bg-tertiary); padding: 8px; border-radius: 4px; text-align: center;">
                        <div style="font-size: 12px; color: var(--text-muted;">السيرفرات</div>
                        <div style="font-weight: 700;" id="statGuilds">0</div>
                    </div>
                    <div style="background: var(--bg-tertiary); padding: 8px; border-radius: 4px; text-align: center;">
                        <div style="font-size: 12px; color: var(--text-muted;">القنوات</div>
                        <div style="font-weight: 700;" id="statChannels">0</div>
                    </div>
                    <div style="background: var(--bg-tertiary); padding: 8px; border-radius: 4px; text-align: center;">
                        <div style="font-size: 12px; color: var(--text-muted;">الأعضاء</div>
                        <div style="font-weight: 700;" id="statMembers">0</div>
                    </div>
                    <div style="background: var(--bg-tertiary); padding: 8px; border-radius: 4px; text-align: center;">
                        <div style="font-size: 12px; color: var(--text-muted;">الرسائل</div>
                        <div style="font-weight: 700;" id="statMessages">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- قائمة السياق -->
    <div id="contextMenu" class="context-menu" style="display: none;">
        <div class="context-menu-item" id="editMessage">
            <i class="fas fa-edit"></i> تعديل
        </div>
        <div class="context-menu-item" id="deleteMessage">
            <i class="fas fa-trash"></i> حذف
        </div>
        <div class="context-menu-item" id="copyMessage">
            <i class="fas fa-copy"></i> نسخ
        </div>
        <div class="context-menu-item" id="pinMessage">
            <i class="fas fa-thumbtack"></i> تثبيت
        </div>
        <div class="context-menu-item" id="replyMessage">
            <i class="fas fa-reply"></i> رد
        </div>
    </div>

    <!-- مكان الإشعارات -->
    <div id="notificationContainer"></div>

    <script>
        // متغيرات عامة
        let currentGuildId = null;
        let currentChannelId = null;
        let guildsData = [];
        let messages = [];
        let currentMessageId = null;
        let voiceUsers = [];
        let isMicMuted = false;
        let isDeafMuted = false;
        let isAfk = false;

        // تحميل البيانات
        async function loadUserInfo() {
            try {
                const response = await fetch('/api/user');
                const user = await response.json();
                
                if (user.error) {
                    showNotification(user.error, 'error');
                    return;
                }
                
                document.getElementById('userName').textContent = user.username;
                document.getElementById('userTag').textContent = '#' + user.discriminator;
                
                const avatarImg = document.querySelector('#userAvatar img');
                avatarImg.src = user.avatar || 'https://cdn.discordapp.com/embed/avatars/0.png';
                
                // تحديث الحالة
                const statusDot = document.querySelector('#userStatus');
                statusDot.className = `user-status ${user.status || 'online'}`;
                
            } catch (error) {
                console.error('خطأ:', error);
            }
        }

        async function loadGuilds() {
            try {
                const response = await fetch('/api/guilds');
                guildsData = await response.json();
                
                // تحديث إحصائيات
                document.getElementById('statGuilds').textContent = guildsData.length;
                
                let totalMembers = 0;
                let totalChannels = 0;
                guildsData.forEach(g => {
                    totalMembers += g.memberCount || 0;
                    totalChannels += g.channels?.length || 0;
                });
                document.getElementById('statMembers').textContent = totalMembers.toLocaleString();
                document.getElementById('statChannels').textContent = totalChannels;
                
                // عرض الخوادم في الشريط الجانبي
                const guildsBar = document.getElementById('guildsBar');
                // إزالة علامات التحميل
                document.querySelectorAll('#guildsBar .loading').forEach(el => el.remove());
                
                guildsData.forEach((guild, index) => {
                    const guildIcon = document.createElement('div');
                    guildIcon.className = 'guild-icon';
                    if (index === 0) {
                        guildIcon.classList.add('active');
                        selectGuild(guild.id);
                    }
                    
                    if (guild.icon) {
                        guildIcon.innerHTML = `<img src="${guild.icon}" alt="${guild.name}" title="${guild.name}">`;
                    } else {
                        guildIcon.textContent = guild.name.charAt(0);
                        guildIcon.title = guild.name;
                    }
                    
                    guildIcon.onclick = () => {
                        document.querySelectorAll('.guild-icon').forEach(g => g.classList.remove('active'));
                        guildIcon.classList.add('active');
                        selectGuild(guild.id);
                    };
                    
                    guildsBar.appendChild(guildIcon);
                });
                
                // تحديث قوائم الاختيار
                updateGuildSelects();
                
            } catch (error) {
                console.error('خطأ:', error);
            }
        }

        function updateGuildSelects() {
            const voiceSelect = document.getElementById('voiceGuildSelect');
            const messageSelect = document.getElementById('messageGuildSelect');
            
            voiceSelect.innerHTML = '<option value="">اختر سيرفر للصوت</option>';
            messageSelect.innerHTML = '<option value="">اختر سيرفر للرسائل</option>';
            
            guildsData.forEach(guild => {
                const option1 = document.createElement('option');
                option1.value = guild.id;
                option1.textContent = guild.name;
                voiceSelect.appendChild(option1.cloneNode(true));
                
                const option2 = document.createElement('option');
                option2.value = guild.id;
                option2.textContent = guild.name;
                messageSelect.appendChild(option2);
            });
            
            // تحديث القنوات عند اختيار سيرفر
            voiceSelect.onchange = (e) => {
                const guild = guildsData.find(g => g.id === e.target.value);
                if (guild) {
                    updateVoiceChannels(guild.channels?.filter(c => c.type === 'voice') || []);
                }
            };
            
            messageSelect.onchange = (e) => {
                const guild = guildsData.find(g => g.id === e.target.value);
                if (guild) {
                    updateMessageChannels(guild.channels?.filter(c => c.type === 'text') || []);
                }
            };
        }

        function updateVoiceChannels(channels) {
            const select = document.getElementById('voiceChannelSelect');
            select.innerHTML = '<option value="">اختر قناة صوتية</option>';
            
            channels.forEach(channel => {
                const option = document.createElement('option');
                option.value = channel.id;
                option.textContent = channel.name;
                select.appendChild(option);
            });
        }

        function updateMessageChannels(channels) {
            const select = document.getElementById('messageChannelSelect');
            select.innerHTML = '<option value="">اختر قناة نصية</option>';
            
            channels.forEach(channel => {
                const option = document.createElement('option');
                option.value = channel.id;
                option.textContent = channel.name;
                select.appendChild(option);
            });
        }

        function selectGuild(guildId) {
            currentGuildId = guildId;
            const guild = guildsData.find(g => g.id === guildId);
            
            if (guild) {
                document.getElementById('selectedGuildName').textContent = guild.name;
                displayChannels(guild.channels || []);
            }
        }

        function displayChannels(channels) {
            const channelsList = document.getElementById('channelsList');
            channelsList.innerHTML = '';
            
            // تقسيم القنوات إلى نصية وصوتية
            const textChannels = channels.filter(c => c.type === 'text');
            const voiceChannels = channels.filter(c => c.type === 'voice');
            
            if (textChannels.length > 0) {
                const category = document.createElement('div');
                category.className = 'channel-category';
                category.innerHTML = `
                    <div class="category-header">
                        <span>قنوات نصية</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                `;
                
                textChannels.forEach(channel => {
                    const channelItem = document.createElement('div');
                    channelItem.className = 'channel-item';
                    channelItem.innerHTML = `
                        <i class="fas fa-hashtag"></i>
                        <span>${channel.name}</span>
                    `;
                    channelItem.onclick = () => selectChannel(channel.id, channel.name);
                    category.appendChild(channelItem);
                });
                
                channelsList.appendChild(category);
            }
            
            if (voiceChannels.length > 0) {
                const category = document.createElement('div');
                category.className = 'channel-category';
                category.innerHTML = `
                    <div class="category-header">
                        <span>قنوات صوتية</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                `;
                
                voiceChannels.forEach(channel => {
                    const channelItem = document.createElement('div');
                    channelItem.className = 'channel-item voice';
                    channelItem.innerHTML = `
                        <i class="fas fa-volume-up"></i>
                        <span>${channel.name}</span>
                    `;
                    category.appendChild(channelItem);
                });
                
                channelsList.appendChild(category);
            }
        }

        function selectChannel(channelId, channelName) {
            currentChannelId = channelId;
            document.getElementById('currentChannelName').textContent = channelName;
            
            // تحديث القوائم
            document.querySelectorAll('.channel-item').forEach(c => c.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            // تحميل الرسائل
            loadMessages(channelId);
        }

        async function loadMessages(channelId) {
            try {
                // في الواقع، يجب جلب الرسائل من API
                // هذا مجرد مثال
                const mockMessages = [
                    {
                        id: 1,
                        author: 'مستخدم 1',
                        content: 'مرحباً!',
                        timestamp: new Date().toLocaleTimeString(),
                        avatar: 'U1'
                    },
                    {
                        id: 2,
                        author: 'مستخدم 2',
                        content: 'كيف الحال؟',
                        timestamp: new Date().toLocaleTimeString(),
                        avatar: 'U2'
                    }
                ];
                
                displayMessages(mockMessages);
                document.getElementById('statMessages').textContent = mockMessages.length;
                
            } catch (error) {
                console.error('خطأ في تحميل الرسائل:', error);
            }
        }

        function displayMessages(messages) {
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';
            
            messages.forEach(msg => {
                const messageEl = document.createElement('div');
                messageEl.className = 'message';
                messageEl.dataset.messageId = msg.id;
                
                messageEl.innerHTML = `
                    <div class="message-avatar">${msg.avatar}</div>
                    <div class="message-content">
                        <div class="message-header">
                            <span class="message-author">${msg.author}</span>
                            <span class="message-timestamp">${msg.timestamp}</span>
                        </div>
                        <div class="message-text">${msg.content}</div>
                        <div class="message-actions">
                            <span class="message-action" onclick="showContextMenu(${msg.id}, event)">⚙️</span>
                            <span class="message-action" onclick="replyToMessage('${msg.id}')">↩️ رد</span>
                            <span class="message-action" onclick="deleteMessage('${msg.id}')">🗑️ حذف</span>
                        </div>
                    </div>
                `;
                
                container.appendChild(messageEl);
            });
        }

        // إظهار قائمة السياق
        function showContextMenu(messageId, event) {
            event.preventDefault();
            event.stopPropagation();
            
            currentMessageId = messageId;
            const menu = document.getElementById('contextMenu');
            
            menu.style.display = 'block';
            menu.style.top = event.pageY + 'px';
            menu.style.left = event.pageX + 'px';
            
            // إخفاء القائمة عند النقر خارجها
            document.addEventListener('click', function hideMenu() {
                menu.style.display = 'none';
                document.removeEventListener('click', hideMenu);
            });
        }

        // إرسال رسالة
        document.getElementById('sendMessageBtn').onclick = async () => {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || !currentChannelId) {
                showNotification('اختر قناة واكتب رسالة أولاً', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/message/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        channelId: currentChannelId,
                        message: message
                    })
                });
                
                const result = await response.json();
                if (result.error) {
                    showNotification(result.error, 'error');
                } else {
                    showNotification('تم إرسال الرسالة');
                    input.value = '';
                    // إعادة تحميل الرسائل
                    loadMessages(currentChannelId);
                }
            } catch (error) {
                showNotification('فشل إرسال الرسالة', 'error');
            }
        };

        // التحكم في الصوت
        document.getElementById('joinVoiceBtn').onclick = async () => {
            const guildId = document.getElementById('voiceGuildSelect').value;
            const channelId = document.getElementById('voiceChannelSelect').value;
            
            if (!guildId || !channelId) {
                showNotification('اختر سيرفر وقناة صوتية', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/voice/join', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ guildId, channelId })
                });
                
                const result = await response.json();
                if (result.error) {
                    showNotification(result.error, 'error');
                } else {
                    showNotification('تم الاتصال بالقناة الصوتية');
                }
            } catch (error) {
                showNotification('فشل الاتصال', 'error');
            }
        };

        document.getElementById('leaveVoiceBtn').onclick = async () => {
            try {
                const response = await fetch('/api/voice/leave', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const result = await response.json();
                showNotification(result.message);
            } catch (error) {
                showNotification('فشل المغادرة', 'error');
            }
        };

        // تبديل حالة الكتم
        document.getElementById('micMuteToggle').onchange = (e) => {
            isMicMuted = e.target.checked;
            const micIcon = document.querySelector('#micToggle');
            micIcon.style.color = isMicMuted ? 'var(--red)' : '';
            showNotification(isMicMuted ? 'تم كتم الميكروفون' : 'تم إلغاء كتم الميكروفون');
        };

        document.getElementById('deafMuteToggle').onchange = (e) => {
            isDeafMuted = e.target.checked;
            const deafIcon = document.querySelector('#deafToggle');
            deafIcon.style.color = isDeafMuted ? 'var(--red)' : '';
            showNotification(isDeafMuted ? 'تم كتم السماعة' : 'تم إلغاء كتم السماعة');
        };

        document.getElementById('afkToggle').onchange = (e) => {
            isAfk = e.target.checked;
            showNotification(isAfk ? 'تم تفعيل وضع AFK' : 'تم إلغاء وضع AFK');
            
            // إرسال الحالة للبوت
            fetch('/api/status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    status: isAfk ? 'idle' : 'online'
                })
            });
        };

        // أيقونات التحكم
        document.getElementById('micToggle').onclick = () => {
            const toggle = document.getElementById('micMuteToggle');
            toggle.checked = !toggle.checked;
            toggle.dispatchEvent(new Event('change'));
        };

        document.getElementById('deafToggle').onclick = () => {
            const toggle = document.getElementById('deafMuteToggle');
            toggle.checked = !toggle.checked;
            toggle.dispatchEvent(new Event('change'));
        };

        // حذف رسالة
        window.deleteMessage = async (messageId) => {
            if (confirm('هل أنت متأكد من حذف هذه الرسالة؟')) {
                showNotification('تم حذف الرسالة');
                // هنا يمكن إضافة كود الحذف الفعلي
            }
        };

        // الرد على رسالة
        window.replyToMessage = (messageId) => {
            document.getElementById('messageInput').placeholder = 'جاري الرد على الرسالة...';
            document.getElementById('messageInput').focus();
        };

        // إظهار الإشعارات
        function showNotification(message, type = 'success') {
            const container = document.getElementById('notificationContainer');
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.style.borderRightColor = type === 'success' ? 'var(--green)' : 'var(--red)';
            notification.innerHTML = `
                <div style="display: flex; align-items: center; gap: 10px;">
                    <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}" 
                       style="color: ${type === 'success' ? 'var(--green)' : 'var(--red)'};"></i>
                    <span>${message}</span>
                </div>
            `;
            
            container.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // تحميل الرسائل عند اختيار قناة
        document.getElementById('loadMessagesBtn').onclick = () => {
            const channelId = document.getElementById('messageChannelSelect').value;
            if (channelId) {
                loadMessages(channelId);
            } else {
                showNotification('اختر قناة أولاً', 'error');
            }
        };

        // مسح الرسائل المعروضة
        document.getElementById('clearMessagesBtn').onclick = () => {
            document.getElementById('chatMessages').innerHTML = '';
            showNotification('تم مسح الرسائل');
        };

        // إرسال الرسالة بالضغط على Enter
        document.getElementById('messageInput').onkeypress = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('sendMessageBtn').click();
            }
        };

        // تحميل البيانات عند فتح الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            loadUserInfo();
            loadGuilds();
            
            // تحديث إحصائيات الرسائل
            setInterval(() => {
                if (currentChannelId) {
                    // تحديث الرسائل
                }
            }, 10000);
        });
    </script>
</body>
</html>
