<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord SelfBot - لوحة تحكم متكاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* نفس التنسيقات السابقة */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rubik', sans-serif;
        }

        :root {
            --bg-primary: #1a1b2f;
            --bg-secondary: #23243a;
            --bg-tertiary: #2c2e45;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --text-primary: #ffffff;
            --text-secondary: #b5b9d4;
            --text-muted: #7d7f9a;
            --green: #23a55a;
            --red: #f23f42;
            --yellow: #f0b232;
            --border: #2c2e45;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* شريط الخوادم */
        .guilds-bar {
            width: 72px;
            background: var(--bg-tertiary);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .guilds-bar::-webkit-scrollbar {
            display: none;
        }

        .guild-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg-secondary);
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            color: var(--text-primary);
            border: 2px solid transparent;
            overflow: hidden;
        }

        .guild-icon:hover {
            border-radius: 16px;
            background: var(--accent);
        }

        .guild-icon.active {
            border-radius: 16px;
            border-color: var(--accent);
        }

        .guild-icon.active::before {
            content: '';
            position: absolute;
            right: -8px;
            width: 4px;
            height: 20px;
            background: white;
            border-radius: 4px;
        }

        .guild-icon img {
            width: 100%;
            height: 100%;
            border-radius: inherit;
            object-fit: cover;
        }

        .guild-separator {
            width: 32px;
            height: 2px;
            background: var(--text-muted);
            margin: 8px 0;
        }

        /* شريط القنوات */
        .channels-bar {
            width: 240px;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
        }

        .channels-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }

        .channels-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 8px;
        }

        .channel-category {
            margin-bottom: 16px;
        }

        .category-header {
            padding: 8px 8px;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }

        .channel-item {
            padding: 6px 8px;
            margin: 2px 0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .channel-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .channel-item.active {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .channel-item i {
            font-size: 20px;
            color: var(--text-muted);
        }

        .channel-item.voice i {
            color: var(--green);
        }

        /* منطقة الدردشة */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 16px;
            animation: fadeIn 0.3s;
            padding: 4px 0;
        }

        .message:hover {
            background: var(--bg-secondary);
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            overflow: hidden;
        }

        .message-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message-author {
            font-weight: 600;
            color: var(--text-primary);
        }

        .message-timestamp {
            font-size: 12px;
            color: var(--text-muted);
        }

        .message-text {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message-actions {
            opacity: 0;
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }

        .message:hover .message-actions {
            opacity: 1;
        }

        .message-action {
            padding: 4px 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .message-action:hover {
            background: var(--accent);
            color: white;
        }

        /* منطقة كتابة الرسائل */
        .chat-input-area {
            padding: 20px;
            border-top: 1px solid var(--border);
        }

        .chat-input-wrapper {
            background: var(--bg-tertiary);
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .chat-input-actions {
            display: flex;
            gap: 12px;
            color: var(--text-muted);
        }

        .chat-input-actions i {
            cursor: pointer;
            font-size: 18px;
        }

        .chat-input-actions i:hover {
            color: var(--accent);
        }

        /* الشريط الجانبي الأيمن */
        .right-sidebar {
            width: 300px;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            overflow-y: auto;
        }

        .user-panel {
            padding: 16px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            position: relative;
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-status {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--bg-tertiary);
        }

        .user-status.online { background: var(--green); }
        .user-status.idle { background: var(--yellow); }
        .user-status.dnd { background: var(--red); }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 14px;
        }

        .user-tag {
            font-size: 12px;
            color: var(--text-muted);
        }

        .control-section {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .section-title {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .voice-users {
            margin-top: 12px;
        }

        .voice-user {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        .voice-user:hover {
            background: var(--bg-tertiary);
        }

        .voice-user-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            overflow: hidden;
        }

        .voice-user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .voice-user-name {
            flex: 1;
        }

        .voice-user-icons {
            display: flex;
            gap: 4px;
            color: var(--text-muted);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--text-muted);
            transition: .3s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--green);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 30px;
            color: var(--text-muted);
        }

        .loading i {
            animation: spin 1s linear infinite;
        }

        .error-message {
            color: var(--red);
            text-align: center;
            padding: 20px;
            background: rgba(242, 63, 66, 0.1);
            border-radius: 8px;
            margin: 10px;
        }

        .no-messages {
            color: var(--text-muted);
            text-align: center;
            padding: 40px;
            font-style: italic;
        }

        .retry-button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
        }

        .retry-button:hover {
            background: var(--accent-hover);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .notification {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--bg-tertiary);
            border-right: 4px solid var(--accent);
            padding: 12px 20px;
            border-radius: 4px;
            z-index: 10000;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- شريط الخوادم -->
        <div class="guilds-bar" id="guildsBar">
            <div class="guild-icon" onclick="window.location.reload()" title="تحديث">
                <i class="fas fa-home"></i>
            </div>
            <div class="guild-separator"></div>
            <div id="guildsContainer">
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                    <span>جاري تحميل الخوادم...</span>
                </div>
            </div>
        </div>

        <!-- شريط القنوات -->
        <div class="channels-bar" id="channelsBar" style="display: none;">
            <div class="channels-header" id="channelsHeader">
                <span id="selectedGuildName">اختر سيرفر</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="channels-list" id="channelsList">
                <div class="loading">
                    <i class="fas fa-spinner"></i> جاري تحميل القنوات...
                </div>
            </div>
        </div>

        <!-- منطقة الدردشة -->
        <div class="chat-area" id="chatArea" style="display: none;">
            <div class="chat-header" id="chatHeader">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-hashtag" style="color: var(--text-muted);"></i>
                    <span id="currentChannelName">الرسائل</span>
                </div>
                <div style="display: flex; gap: 16px; color: var(--text-muted);">
                    <i class="fas fa-phone-alt" style="cursor: pointer;" title="بدء مكالمة" onclick="startVoiceCall()"></i>
                    <i class="fas fa-user-plus" style="cursor: pointer;" title="دعوة"></i>
                    <i class="fas fa-search" style="cursor: pointer;" title="بحث"></i>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="loading">
                    <i class="fas fa-spinner"></i> جاري تحميل الرسائل...
                </div>
            </div>

            <div class="chat-input-area">
                <div class="chat-input-wrapper">
                    <input type="text" class="chat-input" id="messageInput" placeholder="اكتب رسالة...">
                    <div class="chat-input-actions">
                        <i class="fas fa-paper-plane" id="sendMessageBtn" title="إرسال"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- الشريط الجانبي الأيمن -->
        <div class="right-sidebar" id="rightSidebar" style="display: none;">
            <!-- لوحة المستخدم -->
            <div class="user-panel" id="userPanel">
                <div class="user-avatar" id="userAvatar">
                    <img src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Avatar">
                    <div class="user-status online" id="userStatus"></div>
                </div>
                <div class="user-info">
                    <div class="user-name" id="userName">جاري التحميل...</div>
                    <div class="user-tag" id="userTag">#0000</div>
                </div>
                <div style="display: flex; gap: 8px;">
                    <i class="fas fa-microphone" style="cursor: pointer;" title="كتم الميكروفون" id="micToggle" onclick="toggleMic()"></i>
                    <i class="fas fa-headphones" style="cursor: pointer;" title="كتم السماعة" id="deafToggle" onclick="toggleDeaf()"></i>
                </div>
            </div>

            <!-- المتصلون في الصوت -->
            <div class="control-section" id="voiceSection" style="display: none;">
                <div class="section-title">
                    <span>المتصلون في الصوت</span>
                    <i class="fas fa-volume-up"></i>
                </div>
                <div class="voice-users" id="voiceUsers"></div>
            </div>

            <!-- التحكم في الصوت -->
            <div class="control-section">
                <div class="section-title">
                    <span>التحكم الصوتي</span>
                    <i class="fas fa-sliders-h"></i>
                </div>
                
                <select class="server-select" id="voiceChannelSelect" style="width: 100%; padding: 8px; background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-primary); border-radius: 4px; margin-bottom: 8px;">
                    <option value="">اختر قناة صوتية</option>
                </select>
                
                <div style="display: flex; gap: 8px;">
                    <button class="retry-button" style="flex: 1;" onclick="joinVoiceChannel()">
                        <i class="fas fa-sign-in-alt"></i> دخول
                    </button>
                    <button class="retry-button" style="flex: 1; background: var(--red);" onclick="leaveVoiceChannel()">
                        <i class="fas fa-sign-out-alt"></i> خروج
                    </button>
                </div>
            </div>

            <!-- إحصائيات سريعة -->
            <div class="control-section">
                <div class="section-title">
                    <span>إحصائيات</span>
                    <i class="fas fa-chart-line"></i>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <div style="background: var(--bg-tertiary); padding: 8px; border-radius: 4px; text-align: center;">
                        <div style="font-size: 12px; color: var(--text-muted);">السيرفرات</div>
                        <div style="font-weight: 700;" id="statGuilds">0</div>
                    </div>
                    <div style="background: var(--bg-tertiary); padding: 8px; border-radius: 4px; text-align: center;">
                        <div style="font-size: 12px; color: var(--text-muted);">الأعضاء</div>
                        <div style="font-weight: 700;" id="statMembers">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- مكان الإشعارات -->
    <div id="notificationContainer"></div>

    <script>
        // متغيرات عامة
        let guildsData = [];
        let currentGuildId = null;
        let currentChannelId = null;
        let messages = [];
        let voiceUsers = [];
        let isMicMuted = false;
        let isDeafMuted = false;
        let refreshInterval = null;
        let retryCount = 0;
        const MAX_RETRIES = 3;

        // ============ التهيئة ============
        document.addEventListener('DOMContentLoaded', () => {
            console.log('✅ الصفحة تحمست بنجاح');
            loadUserInfo();
            loadGuilds();
        });

        // ============ الإشعارات ============
        function showNotification(message, type = 'success') {
            const container = document.getElementById('notificationContainer');
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.style.borderRightColor = type === 'success' ? 'var(--green)' : 'var(--red)';
            notification.innerHTML = `
                <div style="display: flex; align-items: center; gap: 10px;">
                    <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}" 
                       style="color: ${type === 'success' ? 'var(--green)' : 'var(--red)'};"></i>
                    <span>${message}</span>
                </div>
            `;
            
            container.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // ============ تحميل معلومات المستخدم ============
        async function loadUserInfo() {
            try {
                console.log('🔄 جاري تحميل معلومات المستخدم...');
                const response = await fetch('/api/user');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const user = await response.json();
                console.log('✅ معلومات المستخدم:', user);
                
                if (user.error) {
                    showNotification(user.error, 'error');
                    return;
                }
                
                document.getElementById('userName').textContent = user.username || 'Unknown';
                document.getElementById('userTag').textContent = '#' + (user.discriminator || '0000');
                
                const avatarImg = document.querySelector('#userAvatar img');
                avatarImg.src = user.avatar || 'https://cdn.discordapp.com/embed/avatars/0.png';
                
                const statusDot = document.querySelector('#userStatus');
                statusDot.className = `user-status ${user.status || 'online'}`;
                
            } catch (error) {
                console.error('❌ خطأ في تحميل معلومات المستخدم:', error);
                showNotification('فشل تحميل معلومات المستخدم', 'error');
            }
        }

        // ============ تحميل الخوادم ============
        async function loadGuilds() {
            try {
                console.log('🔄 جاري تحميل الخوادم...');
                
                const response = await fetch('/api/guilds');
                console.log('📥 استجابة الخادم:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('✅ البيانات المستلمة:', data);
                
                // التحقق من أن البيانات مصفوفة
                if (!Array.isArray(data)) {
                    console.error('❌ البيانات ليست مصفوفة:', data);
                    throw new Error('البيانات المستلمة غير صحيحة');
                }
                
                guildsData = data;
                
                if (guildsData.length === 0) {
                    showNotification('لا توجد خوادم متاحة', 'error');
                    displayNoGuilds();
                    return;
                }
                
                // تحديث الإحصائيات
                document.getElementById('statGuilds').textContent = guildsData.length;
                
                let totalMembers = 0;
                guildsData.forEach(g => {
                    totalMembers += g.memberCount || 0;
                });
                document.getElementById('statMembers').textContent = totalMembers.toLocaleString();
                
                // عرض الخوادم
                displayGuilds(guildsData);
                
                // إعادة تعيين عدد المحاولات
                retryCount = 0;
                
            } catch (error) {
                console.error('❌ خطأ في تحميل الخوادم:', error);
                
                retryCount++;
                
                if (retryCount <= MAX_RETRIES) {
                    console.log(`🔄 محاولة إعادة التحميل ${retryCount}/${MAX_RETRIES}...`);
                    showNotification(`محاولة إعادة التحميل ${retryCount}/${MAX_RETRIES}...`, 'error');
                    
                    setTimeout(() => {
                        loadGuilds();
                    }, 2000 * retryCount); // زيادة وقت الانتظار مع كل محاولة
                } else {
                    displayError('فشل تحميل الخوادم بعد عدة محاولات');
                }
            }
        }

        // ============ عرض رسالة خطأ ============
        function displayError(message) {
            const container = document.getElementById('guildsContainer');
            container.innerHTML = `
                <div class="error-message">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>${message}</p>
                    <button class="retry-button" onclick="loadGuilds()">
                        <i class="fas fa-redo"></i> إعادة المحاولة
                    </button>
                </div>
            `;
        }

        // ============ عرض رسالة لا توجد خوادم ============
        function displayNoGuilds() {
            const container = document.getElementById('guildsContainer');
            container.innerHTML = `
                <div class="error-message">
                    <i class="fas fa-server"></i>
                    <p>لا توجد خوادم متاحة</p>
                    <p style="font-size: 12px; margin-top: 10px;">تأكد من وجود حسابك في خوادم ديسكورد</p>
                </div>
            `;
        }

        // ============ عرض الخوادم ============
        function displayGuilds(guilds) {
            const container = document.getElementById('guildsContainer');
            container.innerHTML = '';
            
            guilds.forEach((guild, index) => {
                if (!guild || !guild.id) {
                    console.warn('⚠️ بيانات خادم غير صحيحة:', guild);
                    return;
                }
                
                const guildIcon = document.createElement('div');
                guildIcon.className = 'guild-icon';
                guildIcon.setAttribute('data-guild-id', guild.id);
                guildIcon.setAttribute('title', guild.name || 'غير معروف');
                
                if (guild.icon) {
                    guildIcon.innerHTML = `<img src="${guild.icon}" alt="${guild.name || 'Guild'}" onerror="this.onerror=null; this.parentElement.textContent='${(guild.name || '?').charAt(0).toUpperCase()}';">`;
                } else {
                    guildIcon.textContent = (guild.name || '?').charAt(0).toUpperCase();
                }
                
                guildIcon.onclick = () => selectGuild(guild.id);
                container.appendChild(guildIcon);
            });
            
            // تحديد أول خادم تلقائياً
            if (guilds.length > 0 && guilds[0] && guilds[0].id) {
                setTimeout(() => {
                    selectGuild(guilds[0].id);
                }, 500);
            }
        }

        // ============ اختيار خادم ============
        function selectGuild(guildId) {
            console.log('🔄 اختيار خادم:', guildId);
            
            const guild = guildsData.find(g => g && g.id === guildId);
            if (!guild) {
                console.error('❌ الخادم غير موجود:', guildId);
                return;
            }
            
            currentGuildId = guildId;
            
            // تحديث الشكل
            document.querySelectorAll('.guild-icon').forEach(icon => {
                icon.classList.remove('active');
                if (icon.getAttribute('data-guild-id') === guildId) {
                    icon.classList.add('active');
                }
            });
            
            // إظهار الأقسام
            document.getElementById('channelsBar').style.display = 'flex';
            document.getElementById('chatArea').style.display = 'flex';
            document.getElementById('rightSidebar').style.display = 'flex';
            
            // عرض القنوات
            displayChannels(guild);
            
            // تحديث قائمة القنوات الصوتية
            updateVoiceChannelsSelect(guild);
        }

        // ============ عرض القنوات ============
        function displayChannels(guild) {
            if (!guild || !guild.channels) {
                console.error('❌ لا توجد قنوات للخادم:', guild);
                return;
            }
            
            document.getElementById('selectedGuildName').textContent = guild.name || 'غير معروف';
            
            const channelsList = document.getElementById('channelsList');
            channelsList.innerHTML = '';
            
            // تقسيم القنوات
            const textChannels = guild.channels.filter(ch => ch && ch.type === 'text');
            const voiceChannels = guild.channels.filter(ch => ch && ch.type === 'voice');
            
            // عرض القنوات النصية
            if (textChannels.length > 0) {
                const textCategory = document.createElement('div');
                textCategory.className = 'channel-category';
                textCategory.innerHTML = `
                    <div class="category-header">
                        <span>قنوات نصية</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                `;
                
                textChannels.sort((a, b) => (a.position || 0) - (b.position || 0)).forEach(ch => {
                    const channelItem = document.createElement('div');
                    channelItem.className = 'channel-item';
                    channelItem.setAttribute('data-channel-id', ch.id);
                    channelItem.innerHTML = `
                        <i class="fas fa-hashtag"></i>
                        <span>${ch.name || 'غير معروف'}</span>
                    `;
                    channelItem.onclick = (e) => selectChannel(ch.id, ch.name || 'قناة', e);
                    textCategory.appendChild(channelItem);
                });
                
                channelsList.appendChild(textCategory);
            }
            
            // عرض القنوات الصوتية
            if (voiceChannels.length > 0) {
                const voiceCategory = document.createElement('div');
                voiceCategory.className = 'channel-category';
                voiceCategory.innerHTML = `
                    <div class="category-header">
                        <span>قنوات صوتية</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                `;
                
                voiceChannels.sort((a, b) => (a.position || 0) - (b.position || 0)).forEach(ch => {
                    const channelItem = document.createElement('div');
                    channelItem.className = 'channel-item voice';
                    channelItem.setAttribute('data-channel-id', ch.id);
                    channelItem.innerHTML = `
                        <i class="fas fa-volume-up"></i>
                        <span>${ch.name || 'غير معروف'}</span>
                    `;
                    channelItem.onclick = () => {
                        if (confirm(`هل تريد الاتصال بالقناة الصوتية ${ch.name || 'هذه'}؟`)) {
                            joinVoiceChannelById(ch.id);
                        }
                    };
                    voiceCategory.appendChild(channelItem);
                });
                
                channelsList.appendChild(voiceCategory);
            }
            
            // إذا لم توجد قنوات
            if (textChannels.length === 0 && voiceChannels.length === 0) {
                channelsList.innerHTML = '<div class="no-messages">لا توجد قنوات في هذا الخادم</div>';
            }
        }

        // ============ تحديث قائمة القنوات الصوتية ============
        function updateVoiceChannelsSelect(guild) {
            if (!guild || !guild.channels) return;
            
            const select = document.getElementById('voiceChannelSelect');
            select.innerHTML = '<option value="">اختر قناة صوتية</option>';
            
            const voiceChannels = guild.channels.filter(ch => ch && ch.type === 'voice');
            
            voiceChannels.forEach(ch => {
                const option = document.createElement('option');
                option.value = ch.id;
                option.textContent = ch.name || 'غير معروف';
                select.appendChild(option);
            });
        }

        // ============ اختيار قناة ============
        function selectChannel(channelId, channelName, event) {
            console.log('🔄 اختيار قناة:', channelId, channelName);
            
            currentChannelId = channelId;
            document.getElementById('currentChannelName').textContent = channelName;
            
            // تحديث الشكل
            document.querySelectorAll('.channel-item').forEach(item => {
                item.classList.remove('active');
            });
            
            if (event && event.currentTarget) {
                event.currentTarget.classList.add('active');
            }
            
            // تحميل الرسائل
            loadMessages(channelId);
        }

        // ============ تحميل الرسائل ============
        async function loadMessages(channelId) {
            try {
                const chatMessages = document.getElementById('chatMessages');
                chatMessages.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i> جاري تحميل الرسائل...</div>';
                
                console.log('🔄 جاري تحميل رسائل القناة:', channelId);
                
                const response = await fetch(`/api/channel/${channelId}/messages?limit=50`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log(`✅ تم تحميل ${data.length} رسالة`);
                
                messages = data;
                
                if (messages.length === 0) {
                    chatMessages.innerHTML = '<div class="no-messages">لا توجد رسائل في هذه القناة</div>';
                    return;
                }
                
                displayMessages(messages);
                
            } catch (error) {
                console.error('❌ خطأ في تحميل الرسائل:', error);
                document.getElementById('chatMessages').innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>فشل تحميل الرسائل</p>
                        <button class="retry-button" onclick="loadMessages('${channelId}')">
                            <i class="fas fa-redo"></i> إعادة المحاولة
                        </button>
                    </div>
                `;
            }
        }

        // ============ عرض الرسائل ============
        function displayMessages(messages) {
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';
            
            if (!messages || messages.length === 0) {
                container.innerHTML = '<div class="no-messages">لا توجد رسائل</div>';
                return;
            }
            
            // عرض الرسائل بترتيب تصاعدي (الأقدم أولاً)
            const sortedMessages = [...messages].reverse();
            
            sortedMessages.forEach(msg => {
                if (!msg || !msg.author) return;
                
                const messageEl = document.createElement('div');
                messageEl.className = 'message';
                messageEl.setAttribute('data-message-id', msg.id);
                
                const timestamp = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('ar-EG', {
                    hour: '2-digit',
                    minute: '2-digit'
                }) : '';
                
                const authorName = msg.author.username || 'مستخدم';
                const authorAvatar = msg.author.avatar || '';
                const messageContent = msg.content || '';
                
                messageEl.innerHTML = `
                    <div class="message-avatar">
                        ${authorAvatar ? `<img src="${authorAvatar}" alt="${authorName}">` : authorName.charAt(0).toUpperCase()}
                    </div>
                    <div class="message-content">
                        <div class="message-header">
                            <span class="message-author">${authorName}</span>
                            <span class="message-timestamp">${timestamp}</span>
                        </div>
                        <div class="message-text">${escapeHtml(messageContent)}</div>
                    </div>
                `;
                
                container.appendChild(messageEl);
            });
            
            // التمرير للأسفل
            container.scrollTop = container.scrollHeight;
        }

        // ============ دالة لتجنب XSS ============
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============ إرسال رسالة ============
        document.getElementById('sendMessageBtn').onclick = async () => {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (!content) {
                showNotification('اكتب رسالة أولاً', 'error');
                return;
            }
            
            if (!currentChannelId) {
                showNotification('اختر قناة أولاً', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/message/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        channelId: currentChannelId,
                        content: content
                    })
                });
                
                const result = await response.json();
                
                if (result.error) {
                    showNotification(result.error, 'error');
                } else {
                    showNotification('✅ تم إرسال الرسالة');
                    input.value = '';
                    loadMessages(currentChannelId);
                }
                
            } catch (error) {
                console.error('❌ خطأ في إرسال الرسالة:', error);
                showNotification('فشل إرسال الرسالة', 'error');
            }
        };

        // إرسال بالضغط على Enter
        document.getElementById('messageInput').onkeypress = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('sendMessageBtn').click();
            }
        };

        // ============ الدخول إلى قناة صوتية ============
        window.joinVoiceChannel = async () => {
            const select = document.getElementById('voiceChannelSelect');
            const channelId = select.value;
            
            if (!channelId) {
                showNotification('اختر قناة صوتية أولاً', 'error');
                return;
            }
            
            await joinVoiceChannelById(channelId);
        };

        window.joinVoiceChannelById = async (channelId) => {
            try {
                const response = await fetch(`/api/voice/join/${channelId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        selfMute: isMicMuted,
                        selfDeaf: isDeafMuted
                    })
                });
                
                const result = await response.json();
                
                if (result.error) {
                    showNotification(result.error, 'error');
                } else {
                    showNotification(`✅ ${result.message || 'تم الاتصال'}`);
                    document.getElementById('voiceSection').style.display = 'block';
                    loadVoiceUsers();
                    
                    // بدء التحديث التلقائي للمستخدمين
                    if (refreshInterval) clearInterval(refreshInterval);
                    refreshInterval = setInterval(loadVoiceUsers, 5000);
                }
                
            } catch (error) {
                console.error('❌ خطأ في الاتصال الصوتي:', error);
                showNotification('فشل الاتصال بالقناة الصوتية', 'error');
            }
        };

        // ============ مغادرة القناة الصوتية ============
        window.leaveVoiceChannel = async () => {
            try {
                const response = await fetch('/api/voice/leave', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const result = await response.json();
                showNotification(result.message || 'تم المغادرة');
                
                document.getElementById('voiceSection').style.display = 'none';
                document.getElementById('voiceUsers').innerHTML = '';
                
                if (refreshInterval) {
                    clearInterval(refreshInterval);
                    refreshInterval = null;
                }
                
            } catch (error) {
                console.error('❌ خطأ في مغادرة الصوت:', error);
                showNotification('فشل مغادرة القناة الصوتية', 'error');
            }
        };

        // ============ تحميل المستخدمين في الصوت ============
        async function loadVoiceUsers() {
            try {
                const response = await fetch('/api/voice/users');
                const users = await response.json();
                
                const container = document.getElementById('voiceUsers');
                container.innerHTML = '';
                
                if (!users || users.length === 0) {
                    container.innerHTML = '<div class="no-messages">لا يوجد مستخدمين في الصوت</div>';
                    return;
                }
                
                users.forEach(user => {
                    if (!user) return;
                    
                    const userEl = document.createElement('div');
                    userEl.className = 'voice-user';
                    
                    let statusIcons = '';
                    if (user.voice?.selfMute || user.voice?.mute) {
                        statusIcons += '<i class="fas fa-microphone-slash" style="color: var(--red);"></i>';
                    }
                    if (user.voice?.selfDeaf || user.voice?.deaf) {
                        statusIcons += '<i class="fas fa-volume-mute" style="color: var(--red);"></i>';
                    }
                    
                    userEl.innerHTML = `
                        <div class="voice-user-avatar">
                            <img src="${user.avatar || 'https://cdn.discordapp.com/embed/avatars/0.png'}" alt="${user.username || 'User'}">
                        </div>
                        <div class="voice-user-name">${user.nickname || user.username || 'مستخدم'}</div>
                        <div class="voice-user-icons">${statusIcons}</div>
                    `;
                    
                    container.appendChild(userEl);
                });
                
            } catch (error) {
                console.error('❌ خطأ في تحميل المستخدمين:', error);
            }
        }

        // ============ التحكم في الميكروفون ============
        window.toggleMic = () => {
            isMicMuted = !isMicMuted;
            const micIcon = document.getElementById('micToggle');
            micIcon.style.color = isMicMuted ? 'var(--red)' : '';
            showNotification(isMicMuted ? '🔇 تم كتم الميكروفون' : '🎤 تم إلغاء كتم الميكروفون');
        };

        window.toggleDeaf = () => {
            isDeafMuted = !isDeafMuted;
            const deafIcon = document.getElementById('deafToggle');
            deafIcon.style.color = isDeafMuted ? 'var(--red)' : '';
            showNotification(isDeafMuted ? '🔇 تم كتم السماعة' : '🎧 تم إلغاء كتم السماعة');
        };

        // ============ دوال إضافية ============
        window.startVoiceCall = () => {
            showNotification('ميزة المكالمات قيد التطوير', 'error');
        };
    </script>
</body>
</html>
